name: "Build and Deploy"
on:
  push:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5        # v4 → v5（Node24対応）

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5  # v4 → v5（前回対応済み）

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1          # v1のまま（浮動タグで自動更新）
        with:
          ruby-version: 3.2
          bundler-cache: true

      - name: Build Assets
        run: |
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4  # v3 → v4（前回対応済み）

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4